# Motion tuning for the state machine. All values metres or radians/s.

state_machine:
  ros__parameters:
    v_explore: 0.20
    v_approach: 0.08
    v_follow: 0.15
    w_turn: 0.8
    idle_watchdog_s: 4.0

obstacle_monitor:
  ros__parameters:
    danger_radius_m: 0.35
    forward_arc_deg: 40.0
