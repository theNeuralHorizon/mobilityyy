# apriltag_ros configuration for the 36h11 family used in the SDF world.
# All five tags in the SDF use the 36h11 family with side length 0.15 m.
#
# The `image` remapping is done at launch; this config just sets detector
# parameters. Jazzy's apriltag_ros expects these exact keys.

/**:
  ros__parameters:
    family: "36h11"
    size: 0.15
    max_hamming: 0
    decimate: 2.0
    blur: 0.0
    refine_edges: true
    threads: 2
    detector:
      quad_decimate: 2.0
      quad_sigma: 0.0
